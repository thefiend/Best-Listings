name: Post-deploy indexing

on:
  push:
    branches: [main]

jobs:
  ping-indexing:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Ping IndexNow + Google sitemap
        run: |
          curl -s -o /dev/null -w "submit-index status: %{http_code}\n" \
            -X POST \
            "https://www.bestthingreview.com/api/submit-index?token=${{ secrets.SUBMIT_INDEX_SECRET }}"
